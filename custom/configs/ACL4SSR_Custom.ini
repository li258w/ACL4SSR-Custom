[custom]
; -------------------------------------------------------------------------
; 1. 定义策略组 (Proxy Groups)
; -------------------------------------------------------------------------
; 核心选择组
custom_proxy_group=🚀 节点选择`select`[]♻️ 自动选择`[]🖥️ 甲骨文`[]⬇️ 下载`[]🇭🇰 香港节点`[]🇨🇳 台湾节点`[]🇸🇬 狮城节点`[]🇯🇵 日本节点`[]🇺🇲 美国节点`[]🇰🇷 韩国节点`[]🚀 手动切换`[]DIRECT

; 🖥️ 甲骨文分组：利用正则匹配你订阅中带"甲骨文"或"Oracle"字样的节点
custom_proxy_group=🖥️ 甲骨文`url-test`(甲骨文|Oracle)`http://www.gstatic.com/generate_204`300,,50

; ⬇️ 下载分组：专门用于你指定的代理下载，默认选"节点选择"，也可以手动切换
custom_proxy_group=⬇️ 下载`select`[]🚀 节点选择`[]🖥️ 甲骨文`[]🚀 手动切换`[]DIRECT

; 其他基础分组保持原样
custom_proxy_group=🚀 手动切换`select`.*
custom_proxy_group=♻️ 自动选择`url-test`.*`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇭🇰 香港节点`url-test`(港|HK|hk|Hong Kong)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇯🇵 日本节点`url-test`(日本|东京|大阪|JP|Japan)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇺🇲 美国节点`url-test`(美|US|United States)`http://www.gstatic.com/generate_204`300,,150
custom_proxy_group=🇨🇳 台湾节点`url-test`(台|TW|Taiwan)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇸🇬 狮城节点`url-test`(新加坡|SG|Singapore)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇰🇷 韩国节点`url-test`(KR|Korea|首尔)`http://www.gstatic.com/generate_204`300,,50

; -------------------------------------------------------------------------
; 2. 绑定规则 (Rulesets) - 顺序决定优先级，越靠上优先级越高
; -------------------------------------------------------------------------
; 【最高优先级】指定你的自定义下载规则 -> 走"⬇️ 下载"组
ruleset=⬇️ 下载,https://raw.githubusercontent.com/li258w/ACL4SSR-Custom/main/custom/rules/downloads.list

; 【最高优先级】甲骨文规则 -> 走"🖥️ 甲骨文"组
ruleset=🖥️ 甲骨文,https://raw.githubusercontent.com/li258w/ACL4SSR-Custom/main/custom/rules/oracle.list

; 【普通优先级】基础分流规则（直接引用远程地址，确保稳定）
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/LocalAreaNetwork.list
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/UnBan.list
ruleset=🛑 广告拦截,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/BanAD.list
ruleset=🍃 应用净化,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/BanProgramAD.list
ruleset=📲 电报消息,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Telegram.list
ruleset=💬 Ai平台,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/AI.list
ruleset=📹 油管视频,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/YouTube.list
ruleset=🎥 奈飞视频,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Netflix.list
ruleset=🌍 国外媒体,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ProxyMedia.list
ruleset=🚀 节点选择,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ProxyGFWlist.list
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaDomain.list

; 【普通优先级】原版下载列表 -> 依然走直连，不影响你上面的代理下载
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Download.list

; 兜底
ruleset=🎯 全球直连,[]GEOIP,CN
ruleset=🐟 漏网之鱼,[]FINAL

; -------------------------------------------------------------------------
; 3. 设置
; -------------------------------------------------------------------------
enable_rule_generator=true
overwrite_original_rules=true